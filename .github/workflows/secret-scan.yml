name: Kontrola tajných údajů

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Stažení repozitáře včetně historie
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Kontrola tajných údajů
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
